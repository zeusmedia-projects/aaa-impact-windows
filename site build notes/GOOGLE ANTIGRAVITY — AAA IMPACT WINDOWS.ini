You are building the complete AAA Impact Windows website from the ground up.

This is not a template customization. This is a full strategic redesign and build of a conversion-focused website for a South Florida impact windows, doors, and roofing contractor.

The existing site at https://aaaimpact.com/ is the baseline you are replacing. Inspect it before beginning. Note its current structure, any real assets (phone numbers, service descriptions, project images), and identify all elements that must be preserved or verified before going live.

This build is scoped as a Growth Website Package with two selective Authority-level signature features:
1. Scroll-controlled 3D impact window hero (image sequence, canvas-rendered)
2. Blueprint-to-finished-building commercial reveal section

Every other interaction must be lightweight: CSS, SVG, native browser capabilities, and minimal JavaScript. Do not build a second heavy animation system. Do not add WebGL, React Three Fiber, or 3D libraries outside the hero sequence.

The website must function as a conversion system. It must route residential and commercial visitors to the right experience, make calling easy, make estimating easy, track meaningful lead actions, and make AAA feel significantly more premium and established than its current website.

The central brand position is:
SERIOUS PROTECTION. RESPONSIBLE INSTALLATION. A COMPANY THAT STILL ANSWERS AFTERWARD.

