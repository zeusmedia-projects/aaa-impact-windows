  Primary CTA remains visible and identical. Do not hide it.

Chapter 3 — Technical Hold:
  Show exactly four SVG/HTML callout labels positioned around the canvas edge (not baked into the frames):
    - "Laminated impact glass" (top right of canvas)
    - "Reinforced aluminum framing" (left mid of canvas)
    - "Multi-point locking system" (bottom left of canvas)
    - "Professional installation" (bottom right of canvas)
  Each callout: label text (body-sm, Inter 500, white on dark or near-black on light) + a short Carolina-blue horizontal rule + a small blue dot connector
  Animate in: fade + slight translateX over 300ms at staggered 100ms intervals when Chapter 3 begins
