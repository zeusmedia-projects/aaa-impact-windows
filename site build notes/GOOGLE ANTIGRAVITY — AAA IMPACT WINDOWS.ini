━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Write all copy following these rules:

PROHIBITED language (do not use under any circumstances):
  - "Premier one-stop solution"
  - "Unparalleled excellence"
  - "Cutting-edge solutions"
  - "Trusted partner" (as a generic claim)
  - "Best in Florida" or any superlative without documented proof
  - Fake scarcity: "Only 3 spots left this month"
  - Fake countdowns or fake urgency banners
  - Fake discounts or crossed-out prices
  - Fake reviews or fabricated testimonials
  - Fake statistics: "98% customer satisfaction" without a verified source
  - Fake warranties or coverage claims
  - Keyword stuffing in any heading or paragraph

REQUIRED copy standards:
  - Headlines: short, direct, specific to AAA's actual differentiators
  - Body copy: maximum 2–3 sentences per paragraph on service pages; maximum 4 sentences for narrative sections
  - Every claim must be either verifiable or framed as a commitment (e.g., "We show up after installation" is a commitment; "We have the best crews in Florida" is an unverified superlative — only the former is permitted)
  - Use customer language, not contractor jargon
  - Balance emotional (protection, peace of mind, reliability) with practical (permit process, cleanup, timeline, what to expect)

MARK all unverified content clearly in code comments:
  // [VERIFY: {what needs to be confirmed with client}]

