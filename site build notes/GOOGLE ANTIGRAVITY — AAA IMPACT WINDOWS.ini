SECTION 20: BUILD SEQUENCE RECOMMENDATION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Begin in this order to validate the most critical unknowns first:

Phase 1 — Foundation:
  1. Set up Next.js 14 project with TypeScript, Tailwind, and design tokens
  2. Create site.config.ts with all placeholder values clearly marked
  3. Build the Header, Footer, and MobileConversionBar components
  4. Inspect the /public/hero/desktop/ and /public/hero/mobile/ directories — confirm actual filenames, frame counts, and dimensions
  5. Build HeroSequence.tsx against confirmed asset filenames
  6. Validate hero on desktop Chrome and mobile Safari before proceeding

Phase 2 — Homepage:
  7. Build all homepage sections in order (Sections 5.1–5.10)
  8. Verify each section at mobile and desktop viewports as it is built
  9. Build BlueprintReveal.tsx and confirm the SVG stroke animation works

Phase 3 — Inner Pages:
  10. Build all inner pages using the reusable component library
  11. Build project detail template and PPC landing page template

Phase 4 — Forms, Analytics, SEO:
  12. Implement React Hook Form + Zod on all forms
  13. Implement analytics.ts and connect all event triggers
  14. Implement all JSON-LD schema
  15. Generate sitemap.xml and robots.txt
  16. Verify all metadata

Phase 5 — QA:
  17. Run the complete testing protocol from Section 18
  18. Fix all identified issues
  19. Generate all deliverables from Section 19

Do not skip phases. Do not begin QA before the full build is complete. Do not mark any deliverable as complete without active verification.

