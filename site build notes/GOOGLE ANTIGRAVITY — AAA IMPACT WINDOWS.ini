DESKTOP LAYOUT:
Two-column composition. Left column: 44% width, vertically centered within the viewport, fixed position relative to the pinned section. Right column: 56% width, contains the canvas. On desktop min-width 1280px, add subtle edge lighting (thin 1px Carolina-blue vertical line along the left edge of the canvas column) that activates during Chapter 3.

MOBILE HERO:
- Use the mobile sequence exclusively (do not scale down desktop frames)
- Pinned duration: 250vh (shorter than desktop — mobile users scroll faster)
- Single-column layout: canvas fills full viewport width, left-column content stacks below canvas
- Show only the primary CTA (no secondary or commercial pathway) during animation — keep it always visible as a floating button (position: sticky, bottom of canvas wrapper)
- Chapters 1–3 only; combine Chapter 3 content into Chapter 2 for brevity
- Static fallback for prefers-reduced-motion and for devices where canvas rendering fails (GPU memory exceeded, iOS low-power mode)
- Test on: iPhone 15 Safari, iPhone SE Safari, Samsung Galaxy Chrome

REDUCED-MOTION FALLBACK:
```css
@media (prefers-reduced-motion: reduce) {
  .hero-canvas { display: none; }
  .hero-fallback-image { display: block; }
  /* hero-fallback-image is the static exploded-window image */
}
```
The fallback must still show the full Chapter 1 text content and CTA.

