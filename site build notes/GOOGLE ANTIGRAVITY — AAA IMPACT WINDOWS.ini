SECTION 14: MOTION SYSTEM
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

GSAP (used only for):
  - Hero scroll sequence (HeroSequence.tsx)
  - Blueprint SVG stroke animation (BlueprintReveal.tsx)

IntersectionObserver + CSS (used for all other scroll-triggered motion):
  - Section entry fades (opacity: 0 → 1, translateY: 20px → 0, 400ms ease)
  - Trust strip items (staggered 60ms)
  - Service portal cards (staggered 80ms)
  - Process timeline nodes (staggered 100ms, left-to-right)
  - Blue edge-light animation on dark cards (scaleY: 0 → 1 from bottom, 400ms)
  - Blueprint layers on roofing page (translateY stagger)

CSS-only (no JS):
  - Hover states on all interactive elements
  - Mobile menu slide-in (CSS transform + transition)
  - Door opening reveal on Impact Doors page (CSS rotateY)
  - Button hover and active states
  - Form field focus states

ALL animations:
```css
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
```
  GSAP must also check for reduced-motion before initializing:
```typescript
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    // initialize GSAP ScrollTrigger
  }
```

