CANVAS RENDERING ARCHITECTURE:

Create a HeroSequence component with the following behavior:

```typescript
// HeroSequence.tsx
// - Uses a <canvas> element sized to match the window sequence dimensions
// - Renders frames via drawImage() on every GSAP ScrollTrigger tick
// - Does NOT use <img> tags for the animation frames
// - The canvas is absolutely positioned within a sticky container
// - The sticky container defines the scroll duration (pin spacer)
```

Loading strategy (strictly enforce this order):
1. Immediately render the poster image (standard <img> with priority, not the canvas)
2. Begin loading frame 0 (first canvas frame) — swap poster for canvas when frame 0 is ready
3. Load frames 1–15 (nearby frames) — enables early scrubbing
4. Begin background loading of all remaining frames in sequential order
5. Track which frames are loaded; if a requested frame is not yet loaded, hold the last rendered frame (do not show black or broken)
6. If sequence loading fails entirely, keep the static fallback image visible, remove the canvas

GSAP ScrollTrigger configuration:
ScrollTrigger.create({
trigger: heroSectionRef,
start: "top top",
end: "bottom top", // pin duration = 100vh × chapter multiplier (see below)
pin: true,
scrub: 1,
onUpdate: (self) => {
const frameIndex = Math.floor(self.progress * (totalFrames - 1));
renderFrame(frameIndex);
updateChapter(self.progress);
}
})

Pin duration: The total pinned section height should be approximately 400vh (four chapters of approximately 100vh each). Adjust based on actual frame count — the goal is smooth, unhurried scrubbing where the user can see each chapter clearly before advancing.

SCROLL CHAPTERS:

Define progress thresholds:
- Chapter 1: progress 0.00 → 0.25 (Product Entrance)
- Chapter 2: progress 0.25 → 0.50 (Structural Reveal)
- Chapter 3: progress 0.50 → 0.75 (Technical Hold with callouts)
- Chapter 4: progress 0.75 → 1.00 (Brand Transition)

At each threshold, transition the left-column content using GSAP timeline or CSS class swaps.

