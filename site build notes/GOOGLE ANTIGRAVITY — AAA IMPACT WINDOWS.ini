━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

- All interactive elements must be keyboard-navigable (tab order logical, no focus traps outside modals)
- All images must have descriptive alt text — for project images, alt must describe the specific project (e.g., "Impact window installation in Davie, FL — residential single-family home, full window replacement")
- The hero canvas must include an aria-label describing the animation for screen reader users: aria-label="AAA Impact Windows — animated product demonstration showing impact window components"
- Color contrast: all text must meet WCAG AA 4.5:1. Verify especially: mid-gray text on white background, and white text on Carolina-blue buttons.
- Form labels must be associated with inputs via htmlFor / id pairing. No placeholder-as-label.
- Error messages must be associated with their fields via aria-describedby.
- Mobile menu must be ARIA-compliant: role="dialog", aria-modal="true", focus trapped inside when open, focus returned to hamburger on close.
- Reduced-motion: all GSAP and CSS animations must be suppressed (or reduced to simple fade) when prefers-reduced-motion: reduce is set.

