SECTION 11: PERFORMANCE REQUIREMENTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Target Core Web Vitals (mobile, 4G):
- LCP: < 2.5 seconds (the poster image is the LCP element — it must be served as next/image with priority={true})
- CLS: < 0.1 (reserve canvas dimensions in CSS before frames load; do not let layout shift occur)
- INP: < 200ms
- FID: < 100ms

Enforce:
- Font preconnect and preload for Sora and Inter (next/font handles this automatically)
- Critical CSS inlined (Next.js handles this automatically in App Router with Tailwind)
- No layout shift from image sequence loading (canvas container has explicit aspect-ratio defined in CSS before JS runs)
- All images below the fold: loading="lazy"
- Hero sequence frames: do not block page interactivity. Frame loading occurs in a Web Worker or requestIdleCallback background loop after initial paint.
- No third-party scripts in the critical rendering path. GA4 loaded as `strategy="afterInteractive"` via next/script.
- GSAP loaded only on pages that use it (dynamic import with ssr: false for the hero component)

